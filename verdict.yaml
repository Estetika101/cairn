sites:
    - name: Estetika
      url: https://estetika.org
      crawlLimit: 6
    - name: Woest
      url: https://woest.io
      crawlLimit: 0
checks:
    links: true
    security: true
    seo: true
    geo: true
accessibility:
    wcagVersion: "2.2"
    wcagLevel: AA
failOn: error
output:
    formats:
        - console
        - markdown
        - json
        - tasks
    outDir: ./verdict-report
crawl:
    requestTimeoutMs: 10000
    userAgent: verdict/0.1 (+https://github.com/Estetika101/verdict)
    maxRetries: 2
    retryAfterCapMs: 30000
    maxConcurrentRequests: 8
    maxExtraFetches: 500
    siteConcurrency: 1
    respectRobots: true
    perHost:
        concurrency: 2
        delayMs: 250
links:
    checkExternal: false
tier2:
    mode: auto
    chromePath: ""
plugins: []
serve:
    host: 127.0.0.1
    port: 8787
    interval: 15m
    allowRemoteConfig: false
